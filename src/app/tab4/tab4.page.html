<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Cultura na Faixa
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div class="login">
    <h1>Login</h1>

    <ion-input label="Email" label-placement="floating" fill="outline" placeholder="Digite seu email"></ion-input>
    <ion-input label="Senha" label-placement="floating" fill="outline" placeholder="Digite sua senha"></ion-input>


    <div class="botao">
      <ion-button class="entrar">Entrar</ion-button>
      <!-- <ion-button>Cadastrar</ion-button> -->

      <ion-button expand="block" (click)="setOpen(true)">Cadastrar</ion-button>
      <ion-modal [isOpen]="isModalOpen">
        <ng-template>
          <ion-header>
            <ion-toolbar>
              <ion-title>Modal</ion-title>
              <ion-buttons slot="end">
                <ion-button (click)="setOpen(false)">Fechar</ion-button>
              </ion-buttons>
            </ion-toolbar>
          </ion-header>
          <ion-content class="ion-padding">
            <form action="" class="login">
              <ion-input label="Email" label-placement="floating" fill="outline" placeholder="Digite seu email"></ion-input>
              <ion-input label="Senha" label-placement="floating" fill="outline" placeholder="Digite sua senha"></ion-input>
            </form>
          </ion-content>
        </ng-template>
      </ion-modal>
    </div>


    <div class="outras">
      <h2>Outras formas de login</h2>
      <img src="/assets/google.png" alt="" style="width: 50px; height: auto;">
    </div>

  </div>

</ion-content>
