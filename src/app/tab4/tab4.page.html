<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Cultura na Faixa</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <!-- PERFIL (logado) -->
  <div *ngIf="usuarioLogado && perfil" class="perfil">

    <ion-icon name="personCircleOutline" class="avatar-icon"></ion-icon>

    <ion-card>
      <ion-card-header>
        <ion-card-title>{{ perfil.nome }}</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <p><strong>Email:</strong> {{ perfil.email }}</p>
        <p><strong>Membro desde:</strong> {{ perfil.dataCriacao | date:'dd/MM/yyyy' }}</p>
      </ion-card-content>
    </ion-card>

    <div class="ion-display-flex ion-justify-content-center">
      <ion-button style="width: 60%;" color="danger" expand="block" (click)="sair()">
        Sair da conta
      </ion-button>
    </div>

  </div>

  <!-- LOGIN (não logado) -->
  <div *ngIf="!usuarioLogado" class="login">
    <h1>Login</h1>

    <ion-input label="Email" label-placement="floating" fill="outline" placeholder="Digite seu email"
      [(ngModel)]="loginEmail">
    </ion-input>

    <ion-input label="Senha" label-placement="floating" fill="outline" placeholder="Digite sua senha" type="password"
      [(ngModel)]="loginSenha">
    </ion-input>

    <p *ngIf="mensagem" class="erro">{{ mensagem }}</p>

    <div class="botao">
      <ion-button class="entrar" (click)="entrar()">Entrar</ion-button>
      <ion-button expand="block" (click)="setOpen(true)">Cadastrar</ion-button>

      <ion-modal [isOpen]="isModalOpen">
        <ng-template>
          <ion-header>
            <ion-toolbar>
              <ion-title>Cadastro</ion-title>
              <ion-buttons slot="end">
                <ion-button (click)="setOpen(false)">Fechar</ion-button>
              </ion-buttons>
            </ion-toolbar>
          </ion-header>
          <ion-content class="ion-padding">
            <div class="login">
              <ion-input label="Nome" label-placement="floating" fill="outline" placeholder="Digite seu nome"
                [(ngModel)]="cadastroNome">
              </ion-input>

              <ion-input label="Email" label-placement="floating" fill="outline" placeholder="Digite seu email"
                [(ngModel)]="cadastroEmail">
              </ion-input>

              <ion-input label="Senha" label-placement="floating" fill="outline" placeholder="Digite sua senha"
                type="password" [(ngModel)]="cadastroSenha">
              </ion-input>

              <p *ngIf="mensagemCadastro">{{ mensagemCadastro }}</p>

              <div class="ion-display-flex ion-justify-content-center">
                <ion-button style="width: 80%;" (click)="cadastrar()">Cadastrar</ion-button>
              </div>
            </div>
          </ion-content>
        </ng-template>
      </ion-modal>
    </div>

    <div class="outras">
      <h2>Outras formas de login</h2>
      <img src="/assets/google.png" alt="" style="width: 50px; height: auto;">
    </div>
  </div>

</ion-content>
